name: release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.1.0). Must already exist."
        required: true
        type: string

permissions:
  contents: read

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - id: ref
        run: |
          case "${GITHUB_EVENT_NAME}" in
            release)          tag="${GITHUB_REF_NAME}" ;;
            workflow_dispatch) tag="${{ inputs.tag }}" ;;
            *)                tag="${GITHUB_REF_NAME}" ;;
          esac
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.ref.outputs.tag }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: badbuka/pnet-exporter
          tags: |
            type=semver,pattern={{version}},value=${{ steps.ref.outputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.ref.outputs.tag }}
            type=semver,pattern={{major}},value=${{ steps.ref.outputs.tag }}
            type=raw,value=latest

      - id: vars
        run: |
          echo "version=${{ steps.ref.outputs.tag }}" >> "$GITHUB_OUTPUT"
          echo "commit=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.vars.outputs.version }}
            COMMIT=${{ steps.vars.outputs.commit }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  packages:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - id: ref
        run: |
          case "${GITHUB_EVENT_NAME}" in
            release)          tag="${GITHUB_REF_NAME}" ;;
            workflow_dispatch) tag="${{ inputs.tag }}" ;;
            *)                tag="${GITHUB_REF_NAME}" ;;
          esac
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.ref.outputs.tag }}

      - id: vars
        run: |
          echo "commit=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Build image (linux/amd64)
        run: |
          docker build --platform linux/amd64 \
            --build-arg VERSION="${{ steps.ref.outputs.tag }}" \
            --build-arg COMMIT="${{ steps.vars.outputs.commit }}" \
            -t pnet-exporter-pkg:pack \
            .

      - name: Extract binary and BPF objects
        run: |
          mkdir -p pkg-staging/usr/bin pkg-staging/usr/lib/pnet-exporter/bpf
          cid=$(docker create pnet-exporter-pkg:pack)
          docker cp "$cid":/pnet-exporter pkg-staging/usr/bin/pnet-exporter
          docker cp "$cid":/bpf/. pkg-staging/usr/lib/pnet-exporter/bpf/
          docker rm "$cid"

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"
          cache: true

      - name: Install nfpm
        run: go install github.com/goreleaser/nfpm/v2/cmd/nfpm@v2.41.3

      - name: Build RPM
        env:
          VERSION: ${{ steps.ref.outputs.version }}
          RELEASE: "1"
        run: |
          mkdir -p dist
          "$(go env GOPATH)/bin/nfpm" package -f nfpm.yaml -p rpm -t dist

      - name: Build DEB
        env:
          VERSION: ${{ steps.ref.outputs.version }}
          RELEASE: "1"
        run: |
          "$(go env GOPATH)/bin/nfpm" package -f nfpm.yaml -p deb -t dist

      - name: Upload packages to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ref.outputs.tag }}
          files: |
            dist/*.rpm
            dist/*.deb
          generate_release_notes: true
          fail_on_unmatched_files: true
